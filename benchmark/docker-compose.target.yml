# Germany West (Frankfurt) — Target stack
# Qdrant only — receives the migrated vectors
#
# Deploy to Azure Container Instances (germanywestcentral region):
#   az container create --resource-group vb-benchmark \
#     --name vb-target --location germanywestcentral \
#     --file docker-compose.target.yml

version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"    # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  qdrant_storage:
